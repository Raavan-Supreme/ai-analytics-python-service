server:
  port: 8090

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ai_analytics
    username: postgres
    password: pulkit@sql
    hikari:
      auto-commit: false
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

app:
  storage-root: ./storage
  python-service-base-url: http://localhost:8000
  jwt-secret: change-this-secret
